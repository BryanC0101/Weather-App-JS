<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Weather App</title>
</head>
<body>
    <div class="container">
        <input type="text" id="inputArea" placeholder="Digite uma cidade">
        <div class="cityStateBox">
        <h1 class="city"></h1>
        <h1 class="state"></h1>
        </div>
        <div class="date">
            <p class="dayTime"></p>
            <p>|</p>
            <p class="monthTime"></p>
            <p class="yearTime"></p>
        </div>
        <div class="temp">
            <h1 id="number"></h1>
            <h2 id="tempState"></h2>
            <div class="minMax">
                <p class="minTemp"></p>
                <p class="maxTemp"></p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
