<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Weather App Javascript</title>
</head>
<body>
    <div id="container">
        <div id="search">
            <input type="text" id="weather-input" placeholder="Digite o nome da cidade...">
            <button id="weather-button"><img src="images/search.svg" alt="Pesquisar"></button>
        </div>
        <div id="weather-results">
            <img src="images/weather-icon.svg" alt="weather-icon">
            <p id="weather-temperature">25°C</p>
            <h1 id="city-name">Curitiba</h1>
            
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
